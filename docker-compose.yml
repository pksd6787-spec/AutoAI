services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: docuforge
      POSTGRES_PASSWORD: docuforge
      POSTGRES_DB: docuforge
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data", "./db/migrations:/docker-entrypoint-initdb.d:ro"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  minio:
    image: minio/minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://docuforge:docuforge@postgres:5432/docuforge
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me
    ports: ["8000:8000"]
    depends_on: [postgres, redis, minio]
volumes:
  pgdata:
