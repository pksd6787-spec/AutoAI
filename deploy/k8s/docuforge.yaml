apiVersion: apps/v1
kind: Deployment
metadata: {name: docuforge-api}
spec:
  replicas: 2
  selector: {matchLabels: {app: docuforge-api}}
  template:
    metadata: {labels: {app: docuforge-api}}
    spec:
      containers:
        - name: api
          image: docuforge/api:latest
          ports: [{containerPort: 8000}]
          envFrom: [{secretRef: {name: docuforge-secrets}}]
          readinessProbe: {httpGet: {path: /api/v1/health, port: 8000}}
---
apiVersion: v1
kind: Service
metadata: {name: docuforge-api}
spec:
  selector: {app: docuforge-api}
  ports: [{port: 80, targetPort: 8000}]
